<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeli Hero Background – Export</title>
  <style>
    /* Exact copy of Hero.module.css .hero – same gradients, circles as real elements so capture works */
    .hero-capture {
      position: relative;
      width: 1400px;
      height: 700px;
      background:
        radial-gradient(
          1200px 800px at 78% 35%,
          rgba(255, 255, 255, 0.08),
          rgba(255, 255, 255, 0) 55%
        ),
        linear-gradient(135deg, #120806, #2b1510 55%, #0f0706);
      overflow: hidden;
    }
    .hero-capture .circle {
      position: absolute;
      border-radius: 9999px;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0) 70%);
    }
    .hero-capture .circle-1 {
      width: 520px;
      height: 520px;
      right: -220px;
      top: 40px;
      opacity: 0.25;
    }
    .hero-capture .circle-2 {
      width: 420px;
      height: 420px;
      right: -140px;
      top: 150px;
      opacity: 0.18;
    }

    .wrapper {
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.1);
    }
    .wrapper-inner {
      transform-origin: 0 0;
    }

    body { margin: 0; background: #0f0706; display: flex; flex-direction: column; align-items: center; padding: 24px; font-family: system-ui, sans-serif; color: #fff; }
    .controls { padding: 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    label { display: flex; align-items: center; gap: 6px; }
    select { padding: 8px 12px; background: #2b1510; color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; font-size: 14px; cursor: pointer; }
    select:focus { outline: none; border-color: #8b6f55; }
    button { padding: 10px 20px; background: #8b6f55; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .size-label { opacity: 0.8; font-size: 13px; }
  </style>
</head>
<body>
  <div class="controls">
    <label>
      <span>Screen size</span>
      <select id="sizePicker">
        <option value="1400,700">Desktop (1400×700)</option>
        <option value="1280,600">Laptop (1280×600)</option>
        <option value="1024,600">Tablet (1024×600)</option>
        <option value="768,500">Tablet portrait (768×500)</option>
        <option value="428,500">Mobile large (428×500)</option>
        <option value="390,500">Mobile (390×500)</option>
        <option value="360,480">Mobile small (360×480)</option>
      </select>
    </label>
    <button type="button" id="download">Download hero-background.png</button>
    <span class="size-label" id="sizeLabel">1400×700 px</span>
  </div>
  <div id="wrapper" class="wrapper" style="width: 1400px; height: 700px;">
    <div id="target" class="wrapper-inner hero-capture" style="transform: scale(1, 1);">
      <div class="circle circle-1" aria-hidden="true"></div>
      <div class="circle circle-2" aria-hidden="true"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    var BASE_W = 1400, BASE_H = 700;

    function getSize() {
      var val = document.getElementById('sizePicker').value;
      var parts = val.split(',').map(Number);
      return { w: parts[0], h: parts[1] };
    }

    function applySize() {
      var s = getSize();
      var wrapper = document.getElementById('wrapper');
      var inner = document.getElementById('target');
      wrapper.style.width = s.w + 'px';
      wrapper.style.height = s.h + 'px';
      inner.style.transform = 'scale(' + (s.w / BASE_W) + ', ' + (s.h / BASE_H) + ')';
      document.getElementById('sizeLabel').textContent = s.w + '×' + s.h + ' px';
    }

    document.getElementById('sizePicker').addEventListener('change', applySize);
    applySize();

    document.getElementById('download').onclick = function () {
      var btn = this;
      btn.disabled = true;
      btn.textContent = 'Creating image…';
      var el = document.getElementById('wrapper');
      var s = getSize();
      html2canvas(el, {
        useCORS: true,
        allowTaint: true,
        scale: 1,
        width: s.w,
        height: s.h,
        backgroundColor: null,
        logging: false
      }).then(function (canvas) {
        var a = document.createElement('a');
        a.download = 'hero-background-' + s.w + 'x' + s.h + '.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
        btn.disabled = false;
        btn.textContent = 'Download hero-background.png';
      }).catch(function (err) {
        console.error(err);
        btn.disabled = false;
        btn.textContent = 'Download hero-background.png';
      });
    };
  </script>
</body>
</html>
